---
- name: Validate desktop_env
  ansible.builtin.assert:
    that: desktop_env in ['gnome', 'xfce']
    fail_msg: "desktop_env must be 'gnome' or 'xfce', got '{{ desktop_env }}'"

# Pre-seed gdm3 display manager selection BEFORE desktop install to prevent
# the interactive DM selection prompt from hanging the install.
- name: Pre-seed gdm3 as default display manager (GNOME)
  ansible.builtin.debconf:
    name: gdm3
    question: shared/default-x-display-manager
    value: gdm3
    vtype: select
  when: desktop_env == 'gnome'

- name: Pre-seed lightdm as default display manager (XFCE)
  ansible.builtin.debconf:
    name: lightdm
    question: shared/default-x-display-manager
    value: lightdm
    vtype: select
  when: desktop_env == 'xfce'

- name: Install selected desktop environment ({{ desktop_env }})
  ansible.builtin.apt:
    name: "{{ desktop_packages[desktop_env] }}"
    state: present
    update_cache: true
    dpkg_options: "force-confdef,force-confold"
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: "a"
  async: 1800
  poll: 30

# GNOME ships gnome-remote-desktop which binds port 3389 — same as xrdp.
# Disable and mask it so xrdp owns the port exclusively.
- name: Disable gnome-remote-desktop (conflicts with xrdp on port 3389)
  ansible.builtin.systemd:
    name: gnome-remote-desktop
    enabled: false
    masked: true
    state: stopped
  ignore_errors: true
  when: desktop_env == 'gnome'

# Disable Wayland in GDM — xrdp requires X11 sessions.
- name: Disable Wayland in GDM config
  ansible.builtin.lineinfile:
    path: /etc/gdm3/custom.conf
    regexp: '^#?WaylandEnable'
    line: 'WaylandEnable=false'
    insertafter: '\[daemon\]'
  ignore_errors: true
  when: desktop_env == 'gnome'

- name: Set default systemd target to graphical
  ansible.builtin.command: systemctl set-default graphical.target
  register: set_target
  changed_when: "'Created symlink' in set_target.stderr or 'Created symlink' in set_target.stdout"

- name: Install VS Code (Microsoft apt repo)
  ansible.builtin.include_tasks: vscode.yml

- name: Install Google Chrome (Google apt repo)
  ansible.builtin.include_tasks: chrome.yml

- name: Expose the chosen session command to later roles
  ansible.builtin.set_fact:
    desktop_session_command: "{{ desktop_session_commands[desktop_env] }}"
