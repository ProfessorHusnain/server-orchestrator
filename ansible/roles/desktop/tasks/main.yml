---
- name: Validate desktop_env
  ansible.builtin.assert:
    that: desktop_env in ['gnome', 'xfce']
    fail_msg: "desktop_env must be 'gnome' or 'xfce', got '{{ desktop_env }}'"

# Pre-seed lightdm as display manager BEFORE any desktop install.
# Without this, dpkg prompts during install or gdm3 wins the DM selection,
# causing the postinst to hang on a headless server.
- name: Pre-seed lightdm as default display manager
  ansible.builtin.debconf:
    name: lightdm
    question: shared/default-x-display-manager
    value: lightdm
    vtype: select

- name: Write default display manager config
  ansible.builtin.copy:
    content: "/usr/sbin/lightdm\n"
    dest: /etc/X11/default-display-manager
    mode: "0644"

# Mask gdm3 before the desktop install so its postinst script cannot start
# the display manager service on this headless server (no GPU, no display).
# This is the key step — DEBIAN_FRONTEND=noninteractive alone does not stop
# gdm3 from attempting to start and hanging.
- name: Mask gdm3 to prevent headless postinst hang
  ansible.builtin.systemd:
    name: gdm3
    masked: true
  ignore_errors: true

- name: Install display manager (lightdm)
  ansible.builtin.apt:
    name:
      - lightdm
      - lightdm-gtk-greeter
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: "a"

- name: Install selected desktop environment ({{ desktop_env }})
  ansible.builtin.apt:
    name: "{{ desktop_packages[desktop_env] }}"
    state: present
    install_recommends: false
    dpkg_options: "force-confdef,force-confold"
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: "a"
  async: 1800
  poll: 30

- name: Set default systemd target to graphical
  ansible.builtin.command: systemctl set-default graphical.target
  register: set_target
  changed_when: "'Created symlink' in set_target.stderr or 'Created symlink' in set_target.stdout"

- name: Install VS Code (Microsoft apt repo)
  ansible.builtin.include_tasks: vscode.yml

- name: Install Google Chrome (Google apt repo)
  ansible.builtin.include_tasks: chrome.yml

- name: Expose the chosen session command to later roles
  ansible.builtin.set_fact:
    desktop_session_command: "{{ desktop_session_commands[desktop_env] }}"
