---
# CPU architecture of the target host (x86 | arm). Passed by scripts/create.sh
# from the Terraform `architecture` output; defaulted here so a direct
# playbook run (without -e architecture=...) still resolves to the common case.
architecture: x86

# Package sets per desktop environment. Selected by `desktop_env`.
#
# GNOME: ubuntu-desktop provides the full ubuntu-xorg session type which is
# required for xrdp to work correctly on Ubuntu 24.04. gnome-session-flashback
# does NOT work — it lacks the ubuntu-xorg.session file that startwm.sh needs.
# dbus-x11 provides dbus-launch (required by xrdp session startup).
# xorgxrdp is the Xorg backend module for xrdp.
#
# XFCE: xfce4 + xfce4-goodies — most xrdp-compatible desktop. Uses Xorg by
# default (no Wayland), lightweight, installs in ~3-5 minutes.
desktop_packages:
  gnome:
    - ubuntu-desktop
    - dbus-x11
    - xorgxrdp
  xfce:
    - xfce4
    - xfce4-goodies
    - dbus-x11

# The session command xrdp launches for each desktop (consumed by the xrdp role
# via the `desktop_session_command` fact set in tasks/main.yml).
# GNOME: gnome-session --session=ubuntu uses the ubuntu-xorg session profile
#        installed by ubuntu-desktop. This is the only session name that works
#        correctly with xrdp on Ubuntu 24.04.
# XFCE:  dbus-launch required for XFCE — without it the session exits instantly.
desktop_session_commands:
  gnome: "gnome-session --session=ubuntu"
  xfce: "dbus-launch --exit-with-session startxfce4"
