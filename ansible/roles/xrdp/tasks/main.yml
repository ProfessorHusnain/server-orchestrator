---
- name: Read the RDP password from the environment
  ansible.builtin.set_fact:
    rdp_password: "{{ lookup('env', 'RDP_PASSWORD') }}"
  no_log: true

- name: Require an RDP password
  ansible.builtin.assert:
    that:
      - rdp_password | length > 0
    fail_msg: "RDP_PASSWORD env var must be set (injected by create.sh from TF_VAR_rdp_password)."

- name: Install xrdp
  ansible.builtin.apt:
    name:
      - xrdp
      - dbus-x11
    state: present
    update_cache: true

- name: Ensure RDP/login user exists
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present

- name: Set the RDP user's password (reconciles cloud-init's value)
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    password: "{{ rdp_password | password_hash('sha512') }}"

- name: Add xrdp user to ssl-cert group (read the xrdp TLS key)
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: true

- name: Wire the user's xrdp session to the chosen desktop
  ansible.builtin.copy:
    dest: "/home/{{ rdp_username }}/.xsession"
    owner: "{{ rdp_username }}"
    group: "{{ rdp_username }}"
    mode: "0644"
    content: |
      #!/bin/sh
      # Generated by Ansible — launches the selected desktop under xrdp.
      export XDG_SESSION_DESKTOP={{ desktop_env }}
      export XDG_CURRENT_DESKTOP={{ desktop_env }}
      exec {{ desktop_session_command }}
  notify: Restart xrdp

# GNOME-over-xrdp quirk: polkit blocks login with "Authentication required to
# create a color managed device" / network-manager prompts. Ubuntu 24.04 uses
# polkit rules.d (JavaScript format) — the legacy localauthority .pkla path
# does not exist on 24.04 and causes a task failure.
- name: Ensure polkit rules.d directory exists
  ansible.builtin.file:
    path: /etc/polkit-1/rules.d
    state: directory
    mode: "0755"
  when: desktop_env == 'gnome'

- name: Allow color-manager & network actions without auth prompt (GNOME/xrdp)
  ansible.builtin.copy:
    dest: /etc/polkit-1/rules.d/45-allow-colord.rules
    mode: "0644"
    content: |
      polkit.addRule(function(action, subject) {
          if (action.id.indexOf("org.freedesktop.color-manager.") === 0 && subject.isInGroup("sudo")) {
              return polkit.Result.YES;
          }
      });
  when: desktop_env == 'gnome'
  notify: Restart xrdp

- name: Enable and start xrdp
  ansible.builtin.systemd:
    name: xrdp
    enabled: true
    state: started
