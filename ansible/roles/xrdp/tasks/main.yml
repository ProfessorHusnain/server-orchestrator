---
- name: Read the RDP password from the environment
  ansible.builtin.set_fact:
    rdp_password: "{{ lookup('env', 'RDP_PASSWORD') }}"
  no_log: true

- name: Require an RDP password
  ansible.builtin.assert:
    that:
      - rdp_password | length > 0
    fail_msg: "RDP_PASSWORD env var must be set (injected by create.sh from TF_VAR_rdp_password)."

- name: Install xrdp
  ansible.builtin.apt:
    name:
      - xrdp
      - dbus-x11
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: "a"

- name: Ensure RDP/login user exists
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present

- name: Set the RDP user's password (reconciles cloud-init's value)
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    password: "{{ rdp_password | password_hash('sha512') }}"

- name: Add xrdp user to ssl-cert group (read the xrdp TLS key)
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: true

# Override xrdp's session launcher with the verified working config.
# Key fixes:
#   1. Unset DBUS_SESSION_BUS_ADDRESS + XDG_RUNTIME_DIR — these are inherited
#      from the SSH/login session and point to a bus that doesn't exist in the
#      new X session, causing "problem connecting to the user session" error.
#   2. GNOME detection block — sets the correct ubuntu-xorg session identity
#      env vars that gnome-session requires to start properly under xrdp.
#   3. Falls through to ~/.xsession for per-user overrides (e.g. XFCE).
- name: Configure xrdp startwm.sh (verified working for Ubuntu 24.04)
  ansible.builtin.copy:
    dest: /etc/xrdp/startwm.sh
    mode: "0755"
    content: |
      #!/bin/sh
      # /etc/xrdp/startwm.sh — generated by Ansible
      # Verified for Ubuntu 24.04 headless xrdp + GNOME/XFCE

      # CRITICAL: unset stale session bus vars inherited from SSH/login session.
      # Without this the new X session tries to use a bus that doesn't exist.
      unset DBUS_SESSION_BUS_ADDRESS
      unset XDG_RUNTIME_DIR

      if test -r /etc/profile; then
          . /etc/profile
      fi

      USERXSESSION=$HOME/.xsession
      ALTUSERXSESSION=$HOME/.Xsession
      ERRFILE=$HOME/.xsession-errors

      # If the user has a custom .xsession (written by Ansible for XFCE or
      # explicit GNOME config), delegate to it directly.
      if [ -e "$USERXSESSION" ] || [ -e "$ALTUSERXSESSION" ]; then
          test -x /etc/X11/Xsession && exec /etc/X11/Xsession
          exec /bin/sh /etc/X11/Xsession
      fi

      # Auto-detect GNOME: if x-session-manager points to gnome-session,
      # set the full ubuntu-xorg session identity and launch it.
      using_gnome=
      if [ -e /usr/bin/x-session-manager ]; then
          case "$(readlink -f /usr/bin/x-session-manager)" in
              */gnome-session) using_gnome=1 ;;
          esac
      fi

      if [ -n "$using_gnome" ]; then
          export DESKTOP_SESSION=ubuntu-xorg
          export XDG_SESSION_DESKTOP=ubuntu-xorg
          export XDG_CONFIG_DIRS=/etc/xdg/xdg-ubuntu-xorg:/etc/xdg
          export XDG_CURRENT_DESKTOP=ubuntu:GNOME
          export XDG_DATA_DIRS=/usr/share/ubuntu-xorg:/usr/share/gnome:/usr/local/share/:/usr/share/:/var/lib/snapd/desktop
          export GNOME_SHELL_SESSION_MODE=ubuntu
          exec >"$ERRFILE" 2>&1
          exec /usr/bin/gnome-session --session=ubuntu
      fi

      # Final fallback
      test -x /etc/X11/Xsession && exec /etc/X11/Xsession
      exec /bin/sh /etc/X11/Xsession
  notify: Restart xrdp

# Per-user .xsession — only written for XFCE. GNOME uses the startwm.sh
# auto-detection block above (no .xsession needed for GNOME).
- name: Write per-user .xsession for XFCE
  ansible.builtin.copy:
    dest: "/home/{{ rdp_username }}/.xsession"
    owner: "{{ rdp_username }}"
    group: "{{ rdp_username }}"
    mode: "0755"
    content: |
      #!/bin/sh
      export XDG_SESSION_TYPE=x11
      export XDG_SESSION_DESKTOP=xfce
      export XDG_CURRENT_DESKTOP=XFCE
      exec dbus-launch --exit-with-session startxfce4
  when: desktop_env == 'xfce'
  notify: Restart xrdp

# GNOME-over-xrdp quirk: polkit blocks with "Authentication required to create
# a color managed device". Ubuntu 24.04 uses rules.d (JS format) not localauthority.
- name: Ensure polkit rules.d directory exists
  ansible.builtin.file:
    path: /etc/polkit-1/rules.d
    state: directory
    mode: "0755"

- name: Allow color-manager actions without auth prompt (GNOME/xrdp)
  ansible.builtin.copy:
    dest: /etc/polkit-1/rules.d/45-allow-colord.rules
    mode: "0644"
    content: |
      polkit.addRule(function(action, subject) {
          if (action.id.indexOf("org.freedesktop.color-manager.") == 0 &&
              subject.isInGroup("sudo")) {
              return polkit.Result.YES;
          }
      });
  notify: Restart xrdp

- name: Restart polkit to apply rules
  ansible.builtin.systemd:
    name: polkit
    state: restarted

- name: Enable and start xrdp
  ansible.builtin.systemd:
    name: xrdp
    enabled: true
    state: started
