---
- name: Require an RDP password
  ansible.builtin.assert:
    that:
      - rdp_password is defined
      - rdp_password | length > 0
    fail_msg: "rdp_password must be provided (injected from env at runtime)."

- name: Install xrdp
  ansible.builtin.apt:
    name:
      - xrdp
      - dbus-x11
    state: present
    update_cache: true

- name: Ensure RDP/login user exists
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present

- name: Set the RDP user's password (reconciles cloud-init's value)
  ansible.builtin.user:
    name: "{{ rdp_username }}"
    password: "{{ rdp_password | password_hash('sha512') }}"

- name: Add xrdp user to ssl-cert group (read the xrdp TLS key)
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: true

- name: Wire the user's xrdp session to the chosen desktop
  ansible.builtin.copy:
    dest: "/home/{{ rdp_username }}/.xsession"
    owner: "{{ rdp_username }}"
    group: "{{ rdp_username }}"
    mode: "0644"
    content: |
      #!/bin/sh
      # Generated by Ansible — launches the selected desktop under xrdp.
      export XDG_SESSION_DESKTOP={{ desktop_env }}
      export XDG_CURRENT_DESKTOP={{ desktop_env }}
      exec {{ desktop_session_command }}
  notify: Restart xrdp

# GNOME-over-xrdp quirk: polkit blocks login with "Authentication required to
# create a color managed device" / network-manager prompts. These policy drops
# silence those so the session starts cleanly. No-op for XFCE.
- name: Allow color-manager & network actions without auth prompt (GNOME/xrdp)
  ansible.builtin.copy:
    dest: /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla
    mode: "0644"
    content: |
      [Allow Colord all Users]
      Identity=unix-user:*
      Action=org.freedesktop.color-manager.create-device;org.freedesktop.color-manager.create-profile;org.freedesktop.color-manager.delete-device;org.freedesktop.color-manager.delete-profile;org.freedesktop.color-manager.modify-device;org.freedesktop.color-manager.modify-profile
      ResultAny=no
      ResultInactive=no
      ResultActive=yes
  when: desktop_env == 'gnome'
  notify: Restart xrdp

- name: Enable and start xrdp
  ansible.builtin.systemd:
    name: xrdp
    enabled: true
    state: started
