name: Orchestrate Desktop

# Manual-only. Drives create/destroy of an on-demand Hetzner cloud desktop.
# Infra that costs money is never triggered by push or schedule.
on:
  workflow_dispatch:
    inputs:
      server:
        description: "Server name (must match config/servers/<server>.yaml)"
        type: string
        required: true
        default: alice
      action:
        description: "What to do"
        type: choice
        required: true
        options:
          - create
          - destroy
      profile:
        description: "Profile override for THIS run (blank = use committed config)"
        type: choice
        required: false
        default: ""
        options:
          - ""
          - light
          - medium
          - fast
          - heavy
          - monster
      floating_ip:
        description: "Floating IP mode for THIS run"
        type: choice
        required: false
        default: "ephemeral"
        options:
          - ephemeral
          - from-config

# Serialize runs per server so create/destroy can't race on the same state.
concurrency:
  group: orchestrate-${{ inputs.server }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    # Optional: gate destructive/costly runs behind a protected Environment by
    # uncommenting and creating a matching environment with required reviewers.
    # environment: cloud-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Install tooling (ansible, jq, pyyaml)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible jq python3-yaml

      - name: Write SSH key and derive public key
        id: ssh
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_orchestrator
          chmod 600 ~/.ssh/id_orchestrator
          # Single source of truth: derive the public key from the private one.
          ssh-keygen -y -f ~/.ssh/id_orchestrator > ~/.ssh/id_orchestrator.pub
          echo "key_file=$HOME/.ssh/id_orchestrator" >> "$GITHUB_OUTPUT"

      - name: Run ${{ inputs.action }} for ${{ inputs.server }}
        id: orchestrate
        env:
          # Action and server are passed via env vars, NOT via ${{ }} inside the
          # shell body — that prevents GitHub Actions expression injection, where
          # template substitution happens before the shell parses the string.
          ACTION: ${{ inputs.action }}
          SERVER: ${{ inputs.server }}
          # Secrets (masked)
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # RDP credentials — both passed via env (username as TF_VAR so Terraform
          # picks it up; password kept out of the ansible-playbook command line).
          RDP_USERNAME: ${{ vars.RDP_USERNAME }}
          RDP_PASSWORD: ${{ vars.RDP_PASSWORD }}
          TF_VAR_rdp_password: ${{ vars.RDP_PASSWORD }}
          # SSH key wiring for Terraform + Ansible
          SSH_PRIVATE_KEY_FILE: ${{ steps.ssh.outputs.key_file }}
          # Git-over-SSH (only consumed when a server sets git_ssh: true).
          # Identity from GitHub *variables*; the deploy key from a *secret*.
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          GIT_SSH_PRIVATE_KEY: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
          # Ephemeral profile override (blank => scripts/Terraform use the config)
          TF_VAR_profile_override: ${{ inputs.profile }}
          # Floating IP mode for this run:
          #   ephemeral   -> force no floating IP regardless of server config
          #   from-config -> use whatever floating_ip: the server YAML declares
          FLOATING_IP_MODE: ${{ inputs.floating_ip }}
          # Remote Terraform state (S3-compatible). Per-server isolation is by
          # state key; runners are ephemeral so state MUST be remote.
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_ENDPOINT: ${{ vars.TF_STATE_ENDPOINT }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          set -euo pipefail
          export TF_VAR_ssh_public_key="$(cat ~/.ssh/id_orchestrator.pub)"
          chmod +x scripts/*.sh
          "./scripts/${ACTION}.sh" "$SERVER"

      - name: Job summary
        if: always()
        env:
          ACTION: ${{ inputs.action }}
          SERVER: ${{ inputs.server }}
          PROFILE: ${{ inputs.profile }}
          FLOATING_IP_MODE: ${{ inputs.floating_ip }}
          JOB_STATUS: ${{ job.status }}
          RDP_IP: ${{ steps.orchestrate.outputs.rdp_ip }}
          RDP_USERNAME: ${{ steps.orchestrate.outputs.rdp_username }}
          DESKTOP_ENV: ${{ steps.orchestrate.outputs.desktop_env }}
        run: |
          {
            echo "## Orchestration run summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Server | \`${SERVER}\` |"
            echo "| Action | \`${ACTION}\` |"
            echo "| Profile override | \`${PROFILE:-<from config>}\` |"
            echo "| Floating IP mode | \`${FLOATING_IP_MODE}\` |"
            if [[ "${ACTION}" == "create" && -n "${RDP_IP:-}" ]]; then
              echo "| RDP address | \`${RDP_IP}:3389\` |"
              echo "| RDP username | \`${RDP_USERNAME}\` |"
              echo "| Desktop | \`${DESKTOP_ENV}\` |"
            fi
            echo "| Result | ${JOB_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"
