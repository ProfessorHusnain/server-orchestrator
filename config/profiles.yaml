# Server profiles — maps a friendly name to a Hetzner Cloud server type.
# A server (config/servers/<name>.yaml) selects one of these by `profile:`.
# The GitHub Actions workflow dispatch also exposes these as choices.
#
# All profiles below are confirmed available in fsn1 (Falkenstein, DE).
# CPX = shared AMD EPYC vCPU (cost-optimised). CCX = dedicated AMD EPYC vCPU.
#
# Optional per-profile `arch:` (x86 | arm). Defaults to defaults.architecture
# (x86). Terraform asserts the profile arch matches the boot image arch, so an
# ARM profile (cax*) paired with an x86 image fails fast instead of booting
# an unbootable server. All current profiles are x86, so `arch:` is omitted.
#
# fsn1 pricing (on-demand, excl. IPv4):
#   light   cpx21  ~$13/mo
#   medium  cpx42  ~$34/mo
#   fast    cpx51  ~$96/mo
#   heavy   ccx33  ~$84/mo
#   monster ccx43 ~$169/mo
profiles:
  light:
    type: cpx21
    desc: "3 vCPU, 4 GB shared AMD — browsing / light work"
  medium:
    type: cpx42
    desc: "8 vCPU, 16 GB shared AMD EPYC Genoa — daily dev"
  fast:
    type: cpx51
    desc: "16 vCPU, 32 GB shared AMD EPYC — compile-heavy"
  heavy:
    type: ccx33
    desc: "8 vCPU, 32 GB dedicated AMD EPYC — ML / heavy workloads"
  monster:
    type: ccx43
    desc: "16 vCPU, 64 GB dedicated AMD EPYC — big jobs"
